<style>
    .container {
        display:grid ;
        flex-direction: 10px;
        gap: 20px;
        padding: 20px;
        background-color: #f0f0f0;
    }
    .box {
      border: 2px solid black;
      padding: 10px;
      width: fit-content;
      max-width: 300px;
      font-family: sans-serif;
      background-color: white;
      font-size: 1.2rem;
      line-height: 1.4; 
    }
    .box-1{
        border-color: blue;
    }
    .box-2{
        border-color: #bbbaaa #111111 #ee3e80 #0088dd;
    }
</style>
<body>
 <div class="container">
    <div class="box box-1">
        <p class="one">the ARP odyssey was introduced in 1972.</p>
    </div>
    <hr>
    <div class="box box-2">
        <p class="one">the ARP odyssey was introduced in 1972.</p>
    </div>   
</body>
